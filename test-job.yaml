apiVersion: batch/v1
kind: Job
metadata:
  name: test-loader
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: loader
        image: portfolio-loader:latest
        imagePullPolicy: Never
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: POSTGRES_PORT
