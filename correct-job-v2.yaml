apiVersion: batch/v1
kind: Job
metadata:
  name: correct-loader-v2
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: loader
        image: portfolio-loader:v2
        imagePullPolicy: Never
        env:
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: "portfolio_user"
        - name: POSTGRES_PASSWORD
          value: "secure_password_123"
        - name: POSTGRES_DB
          value: "portfolio_db"
